# Mosquitto broker config for Bouro / Haifuraiya channelizer.
#
# Mirrors the pluto_msk overlay's /etc/mosquitto/mosquitto.conf:
# anonymous access on both TCP (native MQTT) and WebSockets (browser
# dashboards via Paho MQTT JS).
#
# v0 posture: anonymous, no auth, no TLS. Acceptable for the lab
# network. For deployment outside a trusted LAN, layer in TLS + ACLs
# (mosquitto_passwd, listener_settings_per_listener, etc.).

allow_anonymous true

# Native MQTT, used by mosquitto_sub/pub and command-line subscribers.
listener 1883

# WebSockets, used by browser dashboards (Speculator, Bouro).
# Path "/wss" is hard-coded in the Paho JS client URL.
listener 9001
protocol websockets
http_dir /usr/share/bouro/www
